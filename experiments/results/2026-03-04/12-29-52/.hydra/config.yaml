backbone:
  type: hgt
  hidden_channels: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  residual: true
temporal:
  enabled: true
  type: fourier
  causal_mask: true
  data_source_aware: true
objectives:
  transitivity_loss_weight: 0.1
  contrastive_loss_weight: 0.1
  temperature: 0.5
source_dataset: unsw_nb15
target_dataset: nsl_kdd
checkpoint: checkpoints/experiment_D_best.pt
training:
  device: cuda
  seeds:
  - 42
  - 43
  - 44
  - 45
  - 46
experiment_tag: zero_shot_to_nsl_kdd
