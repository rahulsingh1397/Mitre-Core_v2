backbone:
  type: hgt
  hidden_channels: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  residual: true
temporal:
  enabled: true
  type: fourier
  causal_mask: true
  data_source_aware: true
objectives:
  transitivity_loss_weight: 0.1
  contrastive_loss_weight: 0.1
  temperature: 0.5
pretrain_datasets:
- unsw_nb15
- cicids2017
eval_dataset: ton_iot
foundation_objectives:
- masked_node
- masked_relation
- temporal_next_event
masked_node:
  mask_rate: 0.15
masked_relation:
  mask_rate: 0.15
pretraining:
  epochs: 30
device: cuda
checkpoint_out: checkpoints/foundation_preliminary.pt
experiment_tag: foundation_preliminary
