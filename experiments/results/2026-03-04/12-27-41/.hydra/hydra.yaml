hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - +dataset=unsw_nb15
    - +model.temporal_enabled=true
    - +pretraining.objective=infonce
    - +pretraining.temperature=0.5
    - +pretraining.edge_dropout_rate=0.058
    - +pretraining.feature_mask_rate=0.058
    - +pretraining.noise_sigma=0.00054
    - +pretraining.temporal_jitter_max_sec=5.0
    - +pretraining.hard_negative_mining=true
    - +pretraining.epochs=50
    - +pretraining.device=cuda
    - +pretraining.checkpoint_out=checkpoints/pretrain_C_infonce.pt
    - +training.seeds=[42,43,44,45,46]
  job:
    name: run_pretrain_C
    chdir: null
    override_dirname: +dataset=unsw_nb15,+model.temporal_enabled=true,+pretraining.checkpoint_out=checkpoints/pretrain_C_infonce.pt,+pretraining.device=cuda,+pretraining.edge_dropout_rate=0.058,+pretraining.epochs=50,+pretraining.feature_mask_rate=0.058,+pretraining.hard_negative_mining=true,+pretraining.noise_sigma=0.00054,+pretraining.objective=infonce,+pretraining.temperature=0.5,+pretraining.temporal_jitter_max_sec=5.0,+training.seeds=[42,43,44,45,46]
    id: ???
    num: ???
    config_name: model
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: E:\Private\MITRE-CORE 2\MITRE-CORE_V2
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: E:\Private\MITRE-CORE 2\MITRE-CORE_V2\mitre_core\config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: E:\Private\MITRE-CORE 2\MITRE-CORE_V2\outputs\2026-03-04\12-27-41
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
