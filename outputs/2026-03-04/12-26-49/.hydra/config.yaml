backbone:
  type: hgt
  hidden_channels: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  residual: true
temporal:
  enabled: true
  type: fourier
  causal_mask: true
  data_source_aware: true
objectives:
  transitivity_loss_weight: 0.1
  contrastive_loss_weight: 0.1
  temperature: 0.5
dataset: unsw_nb15
model:
  temporal_enabled: true
  temporal:
    num_frequencies: 64
    causal_masking: true
    data_source_mode: raw_capture
training:
  device: cuda
  seeds:
  - 42
  - 43
  - 44
  - 45
  - 46
experiment_tag: B_causal_raw
