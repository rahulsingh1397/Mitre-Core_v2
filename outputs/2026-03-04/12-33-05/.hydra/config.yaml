backbone:
  type: hgt
  hidden_channels: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  residual: true
temporal:
  enabled: true
  type: fourier
  causal_mask: true
  data_source_aware: true
objectives:
  transitivity_loss_weight: 0.1
  contrastive_loss_weight: 0.1
  temperature: 0.5
dataset: unsw_nb15
checkpoint: checkpoints/experiment_D_best.pt
calibration:
  method: temperature_scaling
  eval_bins: 15
training:
  device: cuda
