backbone:
  type: hgt
  hidden_channels: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  residual: true
temporal:
  enabled: true
  type: fourier
  causal_mask: true
  data_source_aware: true
objectives:
  transitivity_loss_weight: 0.1
  contrastive_loss_weight: 0.1
  temperature: 0.5
  transitivity:
    mode: hybrid
dataset: unsw_nb15
experiment_tag: D_hybrid
