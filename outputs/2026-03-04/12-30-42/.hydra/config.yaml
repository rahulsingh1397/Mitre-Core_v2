backbone:
  type: hgt
  hidden_channels: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  residual: true
temporal:
  enabled: true
  type: fourier
  causal_mask: true
  data_source_aware: true
objectives:
  transitivity_loss_weight: 0.1
  contrastive_loss_weight: 0.1
  temperature: 0.5
dataset: cicapt_iiot
checkpoint: checkpoints/experiment_D_best.pt
eval:
  expected_sequence:
  - TA0001
  - TA0002
  - TA0003
  - TA0007
  - TA0008
  - TA0009
  - TA0010
training:
  device: cuda
experiment_tag: apt_sequence_cicapt
