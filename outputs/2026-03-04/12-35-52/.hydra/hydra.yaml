hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - +graph_sizes=[100,500,1000,5000,10000,50000,100000]
    - +model=hgt_full_v2
    - +methods=[hgt_backbone,ann_indexer,hybrid_uf,full_pipeline]
    - +measure=[latency_ms,peak_gpu_memory_mb,peak_cpu_memory_mb,gpu_utilization_pct]
    - +num_runs=3
    - +device=cuda
    - +output=results/scaling_raw.csv
  job:
    name: run_scaling_study
    chdir: null
    override_dirname: +device=cuda,+graph_sizes=[100,500,1000,5000,10000,50000,100000],+measure=[latency_ms,peak_gpu_memory_mb,peak_cpu_memory_mb,gpu_utilization_pct],+methods=[hgt_backbone,ann_indexer,hybrid_uf,full_pipeline],+model=hgt_full_v2,+num_runs=3,+output=results/scaling_raw.csv
    id: ???
    num: ???
    config_name: model
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: E:\Private\MITRE-CORE 2\MITRE-CORE_V2
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: E:\Private\MITRE-CORE 2\MITRE-CORE_V2\mitre_core\config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: E:\Private\MITRE-CORE 2\MITRE-CORE_V2\outputs\2026-03-04\12-35-52
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
