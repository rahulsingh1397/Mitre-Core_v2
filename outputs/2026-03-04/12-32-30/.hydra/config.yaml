backbone:
  type: hgt
  hidden_channels: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  residual: true
temporal:
  enabled: true
  type: fourier
  causal_mask: true
  data_source_aware: true
objectives:
  transitivity_loss_weight: 0.1
  contrastive_loss_weight: 0.1
  temperature: 0.5
dataset: ynu_mipsel_pcap
checkpoint: checkpoints/experiment_D_best.pt
task: malware_family_clustering
training:
  device: cuda
experiment_tag: ynu_mipsel_pcap
